<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portal Clientes &#8212; GECA Creativo</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="favicon.png" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--pink:#FF888F;--orange:#FF8805;--yellow:#FFEF8F;--blue:#003C7E;--ink:#0f0e0d;--white:#ffffff;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Open Sans',sans-serif;background:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden}
.bg-shape{position:absolute;inset:0;pointer-events:none}
.bg-shape::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,60,126,.4),transparent 70%);top:-200px;right:-200px}
.bg-shape::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,136,143,.15),transparent 70%);bottom:-100px;left:-100px}
.accent-bar{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--pink),var(--orange),var(--yellow))}
.login-card{position:relative;z-index:2;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:420px;backdrop-filter:blur(20px);box-shadow:0 32px 80px rgba(0,0,0,.5)}
.logo-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:2rem;
}

.logo-wrap img{
  height:150px;
  width:auto;
  object-fit:contain;
  background:#ffffff;
  padding:18px 28px;
  border-radius:20px;
  border:1px solid rgba(0,0,0,.06);
  box-shadow:
    0 8px 20px rgba(0,0,0,.15),
    0 20px 50px rgba(0,0,0,.20);
}
.login-title{font-family:'Montserrat',sans-serif;font-size:1.4rem;font-weight:800;color:var(--white);text-align:center;margin-bottom:.4rem}
.login-sub{font-size:.85rem;color:rgba(255,255,255,.5);text-align:center;margin-bottom:2rem;letter-spacing:.02em}
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:.45rem}
.form-group input{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:.8rem 1rem;color:var(--white);font-family:'Open Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s,box-shadow .2s}
.form-group input::placeholder{color:rgba(255,255,255,.25)}
.form-group input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,136,143,.15)}
.btn-login{width:100%;margin-top:.5rem;background:linear-gradient(135deg,var(--pink),var(--orange));color:var(--white);border:none;border-radius:100px;padding:1rem;font-family:'Montserrat',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:transform .2s,box-shadow .2s,opacity .2s;box-shadow:0 6px 24px rgba(255,136,143,.35)}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,136,143,.5)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error-msg{background:rgba(255,136,143,.15);border:1px solid rgba(255,136,143,.35);color:var(--pink);border-radius:10px;padding:.75rem 1rem;font-size:.85rem;text-align:center;margin-top:1rem;display:none}
.error-msg.show{display:block}
.back-link{display:block;text-align:center;margin-top:1.5rem;font-size:.8rem;color:rgba(255,255,255,.35);text-decoration:none;transition:color .2s;font-family:'Montserrat',sans-serif;letter-spacing:.04em}
.back-link:hover{color:rgba(255,255,255,.7)}
.divider{height:1px;background:rgba(255,255,255,.08);margin:1.5rem 0}
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="bg-shape"></div>
<div class="login-card">
  <div class="logo-wrap"><img src="Logo%20GECA.png" alt="GECA Creativo"/></div>
  <h1 class="login-title">Portal de Clientes</h1>
  <p class="login-sub">Ingresa tus credenciales para acceder a tus informes</p>
  <div class="form-group">
    <label>Correo electr&#243;nico</label>
    <input type="email" id="email" placeholder="tu@empresa.com" autocomplete="email"/>
  </div>
  <div class="form-group">
    <label>Contrase&#241;a</label>
    <input type="password" id="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" autocomplete="current-password"/>
  </div>
  <button class="btn-login" id="btnLogin" onclick="login()">Ingresar al portal &#8594;</button>
  <div class="error-msg" id="errorMsg"></div>
  <div class="divider"></div>
  <a href="index.html" class="back-link">&#8592; Volver al sitio principal</a>
</div>
<script>
var SUPABASE_URL = 'https://aynfjhepnsidssrxblat.supabase.co';
var SUPABASE_KEY = 'sb_publishable_WdFUbarKlUsg-de3J0vnAg_TQkQWGfq';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

sb.auth.getSession().then(function(r){
  if(r.data.session) window.location.href = 'dashboard.html';
});

async function login(){
  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('password').value;
  var btn   = document.getElementById('btnLogin');
  var err   = document.getElementById('errorMsg');
  if(!email || !pass){ showErr('Por favor completa todos los campos.'); return; }
  btn.disabled = true; btn.textContent = 'Verificando...'; err.classList.remove('show');
  var r = await sb.auth.signInWithPassword({email:email, password:pass});
  if(r.error){ showErr('Credenciales incorrectas. Verifica tus datos.'); btn.disabled=false; btn.textContent='Ingresar al portal \u2192'; return; }
  btn.textContent = '\u2713 Acceso concedido';
  setTimeout(function(){ window.location.href='dashboard.html'; }, 600);
}
function showErr(m){ var e=document.getElementById('errorMsg'); e.textContent=m; e.classList.add('show'); }
document.addEventListener('keydown', function(e){ if(e.key==='Enter') login(); });
</script>
</body>
</html>
